# Server — must match VITE_REPORT_URL in the frontend .env
server.port=8080

# MySQL Configuration
# NOTE: DB_PASSWORD must match the value in Water_Project_Backend/.env
spring.datasource.url=jdbc:mysql://localhost:3306/water_project_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS — allow the React dev server and any production origin
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:4173